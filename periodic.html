<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Periodic Table</title>
  <style>
    table {
      border-collapse: collapse;
      text-align: center;
    }
    td {
      border: 1px solid #333;
      width: 60px;
      height: 60px;
      padding: 5px;
    }
    .element {
      font-weight: bold;
    }
    .number {
      font-size: 0.8em;
    }
  </style>
</head>
<body>
  <h2>Periodic Table</h2>
  <table>
    <!-- Row 1 -->
    <tr>
      <td class="element">H<sub class="number">1</sub></td>
      <td colspan="16"></td>
      <td class="element">He<sub class="number">2</sub></td>
    </tr>
    <!-- Row 2 -->
    <tr>
      <td class="element">Li<sub class="number">3</sub></td>
      <td class="element">Be<sub class="number">4</sub></td>
      <td colspan="10"></td>
      <td class="element">B<sub class="number">5</sub></td>
      <td class="element">C<sub class="number">6</sub></td>
      <td class="element">N<sub class="number">7</sub></td>
      <td class="element">O<sub class="number">8</sub></td>
      <td class="element">F<sub class="number">9</sub></td>
      <td class="element">Ne<sub class="number">10</sub></td>
    </tr>
    <!-- Row 3 -->
    <tr>
      <td class="element">Na<sub class="number">11</sub></td>
      <td class="element">Mg<sub class="number">12</sub></td>
      <td colspan="10"></td>
      <td class="element">Al<sub class="number">13</sub></td>
      <td class="element">Si<sub class="number">14</sub></td>
      <td class="element">P<sub class="number">15</sub></td>
      <td class="element">S<sub class="number">16</sub></td>
      <td class="element">Cl<sub class="number">17</sub></td>
      <td class="element">Ar<sub class="number">18</sub></td>
    </tr>
    <!-- Row 4 (Transition metals start) -->
    <tr>
      <td class="element">K<sub class="number">19</sub></td>
      <td class="element">Ca<sub class="number">20</sub></td>
      <td class="element">Sc<sub class="number">21</sub></td>
      <td class="element">Ti<sub class="number">22</sub></td>
      <td class="element">V<sub class="number">23</sub></td>
      <td class="element">Cr<sub class="number">24</sub></td>
      <td class="element">Mn<sub class="number">25</sub></td>
      <td class="element">Fe<sub class="number">26</sub></td>
      <td class="element">Co<sub class="number">27</sub></td>
      <td class="element">Ni<sub class="number">28</sub></td>
      <td class="element">Cu<sub class="number">29</sub></td>
      <td class="element">Zn<sub class="number">30</sub></td>
      <td class="element">Ga<sub class="number">31</sub></td>
      <td class="element">Ge<sub class="number">32</sub></td>
      <td class="element">As<sub class="number">33</sub></td>
      <td class="element">Se<sub class="number">34</sub></td>
      <td class="element">Br<sub class="number">35</sub></td>
      <td class="element">Kr<sub class="number">36</sub></td>
    </tr>
  </table>
</body>
</html>
